[colors]
draw_bold_text_with_bright_colors = false

[colors.normal]
black = "#282828"
red = "#cc241d"
green = "#98971a"
yellow = "#d79921"
blue = "#458588"
magenta = "#b16286"
cyan = "#689d6a"
white = "#a89984"

[colors.bright]
black = "#928374"
red = "#fb4934"
green = "#b8bb26"
yellow = "#fabd2f"
blue = "#83a598"
magenta = "#d3869b"
cyan = "#8ec07c"
white = "#ebdbb2"

[colors.dim]
black = "#928374"
red = "#9d0006"
green = "#79740e"
yellow = "#b57614"
blue = "#076678"
magenta = "#8f3f71"
cyan = "#427b58"
white = "#3c3836"

[colors.primary]
background = "#282828"
foreground = "#ebdbb2"
bright_foreground = "#fbf1c7"
dim_foreground = "#d5c4a1"

[cursor]
blink_interval = 750
unfocused_hollow = true

[cursor.style]
blinking = "On"
shape = "Block"

[font]
size = 12.0

[font.normal]
family = "DejaVuSansM Nerd Font"

[mouse]
hide_when_typing = true

[terminal.shell]
args = ["--login"]
program = "/bin/bash"

[window]
dynamic_title = true
title = "Alacritty"

[keyboard]
bindings = [
    { key = "F11", action = "ToggleFullscreen" },
    { key = "Enter", mods = "Control", action = "ToggleFullscreen" },
]

[general]
live_config_reload = true
